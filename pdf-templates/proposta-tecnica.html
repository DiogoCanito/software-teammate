<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise Estratégica — {{NOME_EMPRESA}}</title>
<link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@400;500;600;700;800&family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: #1a1a1a;
    background: #fff;
    line-height: 1.6;
  }

  /* ── CAPA ── */
  .cover {
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    page-break-after: always;
  }

  .cover-header {
    background: #05668d;
    padding: 48px 60px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .cover-logo {
    height: 40px;
    filter: brightness(0) invert(1);
  }

  .cover-body {
    flex: 1;
    padding: 80px 60px 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .cover-tag {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #ff956b;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 24px;
  }

  .cover-title {
    font-family: 'Funnel Display', sans-serif;
    font-size: 42px;
    font-weight: 700;
    color: #05668d;
    line-height: 1.15;
    margin-bottom: 16px;
  }

  .cover-empresa {
    font-family: 'Funnel Display', sans-serif;
    font-size: 28px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 48px;
  }

  .cover-meta {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
  }

  .cover-meta-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .cover-meta-label {
    font-size: 9px;
    font-weight: 600;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .cover-meta-value {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
  }

  .cover-footer {
    padding: 24px 60px;
    border-top: 1px solid #e5e7eb;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cover-footer-text {
    font-size: 10px;
    color: #999;
  }

  .cover-validity {
    font-size: 10px;
    color: #ff956b;
    font-weight: 500;
  }

  /* ── PÁGINAS INTERIORES ── */
  .page {
    padding: 40px 50px;
    page-break-after: always;
  }

  .page:last-child {
    page-break-after: avoid;
  }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 12px;
    border-bottom: 1px solid #e5e7eb;
    margin-bottom: 28px;
  }

  .page-header-logo {
    height: 22px;
  }

  .page-header-title {
    font-size: 10px;
    color: #999;
    font-weight: 500;
  }

  /* ── TIPOGRAFIA ── */
  h1 {
    font-family: 'Funnel Display', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: #05668d;
    border-bottom: 3px solid #ff956b;
    padding-bottom: 10px;
    margin-bottom: 20px;
    line-height: 1.2;
  }

  h2 {
    font-family: 'Funnel Display', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #05668d;
    border-left: 4px solid #ff956b;
    padding-left: 12px;
    margin: 28px 0 14px;
    line-height: 1.3;
  }

  h3 {
    font-family: 'Funnel Display', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #05668d;
    margin: 18px 0 8px;
    line-height: 1.3;
  }

  p {
    margin-bottom: 12px;
    color: #1a1a1a;
    line-height: 1.65;
  }

  strong { font-weight: 600; }

  ul, ol {
    margin: 8px 0 12px 20px;
  }

  li {
    margin-bottom: 5px;
    line-height: 1.5;
  }

  /* ── TABELAS ── */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 14px 0 20px;
    font-size: 10.5px;
  }

  th {
    background: #05668d;
    color: #fff;
    font-weight: 600;
    padding: 9px 12px;
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  td {
    padding: 8px 12px;
    border-bottom: 1px solid #e5e7eb;
    color: #1a1a1a;
  }

  tr:nth-child(odd) td { background: #f8f9fa; }
  tr:last-child td {
    background: #05668d;
    color: #fff;
    font-weight: 700;
    border-bottom: none;
  }

  /* ── CALLOUTS ── */
  .callout {
    background: #f8f9fa;
    border-left: 4px solid #ff956b;
    padding: 16px 20px;
    margin: 16px 0;
    border-radius: 0 4px 4px 0;
  }

  .callout-label {
    font-size: 9px;
    font-weight: 600;
    color: #ff956b;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .callout-value {
    font-family: 'Funnel Display', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #05668d;
    line-height: 1;
    margin-bottom: 4px;
  }

  .callout-desc {
    font-size: 10px;
    color: #555;
    line-height: 1.4;
  }

  .callouts-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 16px 0;
  }

  /* ── KPI ROI TABLE ── */
  .roi-table {
    background: #f8f9fa;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    overflow: hidden;
  }

  .roi-table table {
    margin: 0;
  }

  .roi-table tr:last-child td {
    background: #05668d;
    color: #fff;
    font-weight: 700;
  }

  /* ── PROCESSO CARD ── */
  .processo-card {
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 10px;
    background: #fff;
  }

  .processo-title {
    font-family: 'Funnel Display', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 6px;
  }

  .processo-meta {
    display: flex;
    gap: 16px;
    font-size: 9.5px;
    color: #555;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .processo-meta span {
    background: #f0f9ff;
    color: #05668d;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }

  /* ── FOOTER ── */
  .page-footer {
    margin-top: 32px;
    padding-top: 10px;
    border-top: 1px solid #e5e7eb;
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #999;
  }

  /* ── PRINT ── */
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .cover { page-break-after: always; }
    .page { page-break-after: always; }
    .page:last-child { page-break-after: avoid; }
  }
</style>
</head>
<body>

<!-- CAPA -->
<div class="cover">
  <div class="cover-header">
    <img src="{{LOGO_BASE64}}" alt="TeamMate" class="cover-logo" onerror="this.style.display='none'">
    <span style="font-family:'Funnel Display',sans-serif;font-size:22px;font-weight:700;color:#fff;">TeamMate</span>
  </div>
  <div class="cover-body">
    <div class="cover-tag">Documento Confidencial — Análise Estratégica</div>
    <div class="cover-title">Análise Estratégica</div>
    <div class="cover-empresa">{{NOME_EMPRESA}}</div>
    <div class="cover-meta">
      <div class="cover-meta-item">
        <span class="cover-meta-label">Preparado por</span>
        <span class="cover-meta-value">TeamMate</span>
      </div>
      <div class="cover-meta-item">
        <span class="cover-meta-label">Data</span>
        <span class="cover-meta-value">{{DATA_EMISSAO}}</span>
      </div>
    </div>
  </div>
  <div class="cover-footer">
    <span class="cover-footer-text">TeamMate — Análise Estratégica</span>
  </div>
</div>

<!-- CONTEÚDO -->
<div class="page">
  <div class="page-header">
    <img src="{{LOGO_BASE64}}" alt="TeamMate" class="page-header-logo" onerror="this.style.display='none'">
    <span class="page-header-title">Análise Estratégica — {{NOME_EMPRESA}}</span>
  </div>

  <div class="content">
    {{CONTEUDO_HTML}}
  </div>

  <div class="page-footer">
    <span>TeamMate — Análise Estratégica</span>
    <span>{{DATA_EMISSAO}}</span>
  </div>
</div>

</body>
</html>
